<h1 class="text-3xl md:text-4xl font-bold tracking-tighter text-on-surface">Create a New Habit</h1>
<p class="text-on-surface-variant text-sm mt-3 max-w-md">Define your next milestone. Small, consistent actions are the building blocks of professional discipline.</p>
</header>
<form class="space-y-8">
<!-- Field: Habit Name -->
<div class="space-y-2">
<label class="block text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">Habit Name</label>
<input class="w-full px-0 py-3 bg-transparent border-0 border-b-2 border-surface-container-highest focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline-variant font-medium transition-colors" placeholder="e.g. Morning Focus Session" type="text"/>
</div>
<!-- Field: Description -->
<div class="space-y-2">
<label class="block text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">Description</label>
<textarea class="w-full px-4 py-3 bg-surface-container-highest border-0 rounded-lg focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant text-sm transition-all" placeholder="Describe the context or why this habit matters to you..." rows="3"></textarea>
</div>
<!-- Field: Goal -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
<div class="space-y-2">
<label class="block text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">Goal (Consecutive Days)</label>
<div class="flex items-center gap-4">
<input class="w-24 px-4 py-3 bg-surface-container-highest border-0 rounded-lg focus:ring-2 focus:ring-primary text-on-surface font-headline font-bold text-lg" type="number" value="21"/>
<span class="text-on-surface-variant text-sm font-medium">Days</span>
</div>
</div>
<!-- Frequency Mockup -->

<div class="flex gap-1">
<button class="w-8 h-8 rounded-sm bg-tertiary flex items-center justify-center text-[10px] text-on-tertiary font-bold" type="button">M</button>
