<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome to shopping</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        h2 {
            color: #2c3e50;
            text-align: center;
        }
        h3 {
            color: #333;
        }
        img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }
        button {
            background-color: #00bcd4;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0097a7;
        }
    </style>
</head>
<body>
    <div style="text-align:center;padding:10px;">
        <a href="../index.html"><button style="padding:8px 20px;font-size:14px;cursor:pointer;">Back to Home</button></a>
    </div>
    <header style="background-color: #2c3e50; color: white; text-align: center; padding: 15px;">
    <h1 style="margin: 0;">My Online Store</h1>
</header>
<section>
    <h2>Products</h2>

    <article>
        <h3>Laptop</h3>
        <img src="laptop.jpg" style="border: 2px solid #00bcd4;">
        <p style="font-weight: bold; color: #e74c3c;">Price: ₹50,000</p>
        <button>Add to Cart</button>
    </article>

    <article>
        <h3>Headphones</h3>
        <img src="headphone.jpg" style="border: 2px solid #00bcd4;">
        <p style="font-weight: bold; color: #e74c3c;">Price: ₹2,000</p>
        <button>Add to Cart</button>
    </article>
</section>
</body>
</html>
