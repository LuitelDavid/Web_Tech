<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 35px 40px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #667eea;
        }

        .tabs button {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border: none;
            background: white;
            font-size: 15px;
            font-weight: 600;
            color: #667eea;
            transition: background 0.3s, color 0.3s;
        }

        .tabs button.active {
            background: #667eea;
            color: white;
        }

        .tabs button:hover:not(.active) {
            background: #f0f0ff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 5px;
        }

        .btn:hover {
            background: #5a6fd6;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div style="text-align:center;padding:15px;">
        <a href="../index.html" style="text-decoration:none;"><button style="padding:8px 20px;font-size:14px;cursor:pointer;background:rgba(255,255,255,0.9);color:#667eea;border:none;border-radius:6px;font-weight:600;">Back to Home</button></a>
    </div>

    <div class="container">
        <h2>User Registration</h2>

        <div class="tabs">
            <button id="signupTab" class="active" onclick="showForm('signup')">Sign Up</button>
            <button id="loginTab" onclick="showForm('login')">Login</button>
        </div>

        <!-- Sign Up Form -->
        <form id="signupForm" onsubmit="return validateSignup()">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="Enter first name" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Enter last name" required>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn">Sign Up</button>
        </form>

        <!-- Login Form -->
        <form id="loginForm" class="hidden" onsubmit="return validateLogin()">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <script>
        function showForm(form) {
            if (form === 'signup') {
                document.getElementById('signupForm').classList.remove('hidden');
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('signupTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
            } else {
                document.getElementById('signupForm').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('signupTab').classList.remove('active');
                document.getElementById('loginTab').classList.add('active');
            }
        }

        function validateSignup() {
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return false;
            }

            alert('Sign Up Successful!');
            return false;
        }

        function validateLogin() {
            alert('Login Successful!');
            return false;
        }
    </script>

</body>
</html>
